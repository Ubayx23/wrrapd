<style data-purpose="layout-and-mask">
    :root {
      --mouse-x: 50%;
      --mouse-y: 50%;
    }

    body {

      padding: 0;
      overflow: hidden;
      background-color: #F0F0F0; /* Base background (visible through cutout) */
      height: 100vh;
      width: 100vw;
    }

    /* 
       The overlay uses a radial gradient mask. 
       The transparent part of the mask (the 'hole') follows the mouse.
    */
    .flashlight-overlay {
      position: fixed;
      inset: 0;
      background-color: #0F1C2E;
      pointer-events: none; /* Let clicks pass through to form elements */
      z-index: 20;
      mask-image: radial-gradient(
        circle 300px at var(--mouse-x) var(--mouse-y),
        transparent 99%,
        black 100%
      );
      -webkit-mask-image: radial-gradient(
        circle 300px at var(--mouse-x) var(--mouse-y),
        transparent 99%,
        black 100%
      );
    }

    /* Ensure UI elements that stay white are always above the mask */
    .always-visible {
      position: relative;
      z-index: 30;
    }

    /* The hidden hero text is placed below the mask layer in the stacking context */
    .hero-container {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      text-align: center;
    }
  </style>

<script data-purpose="flashlight-logic">
    // Track mouse position and update CSS variables for the mask
    const overlay = document.getElementById('flashlight');
    
    // Initial position center
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;

    function updateFlashlight(e) {
      // Use clientX/Y for mouse events, touches[0] for touch events
      const x = e.clientX || (e.touches && e.touches[0].clientX);
      const y = e.clientY || (e.touches && e.touches[0].clientY);

      if (x !== undefined && y !== undefined) {
        document.documentElement.style.setProperty('--mouse-x', `${x}px`);
        document.documentElement.style.setProperty('--mouse-y', `${y}px`);
      }
    }

    // Event listeners for interactivity
    window.addEventListener('mousemove', updateFlashlight);
    window.addEventListener('touchmove', updateFlashlight);

    // Initial positioning to ensure it's centered on load
    document.documentElement.style.setProperty('--mouse-x', `${mouseX}px`);
    document.documentElement.style.setProperty('--mouse-y', `${mouseY}px`);
  </script>
